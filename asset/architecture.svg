<svg viewBox="0 0 1120 420" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue',Arial,sans-serif">
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#0f766e"/>
    </marker>
    <style>
      .stage  { fill:#ffffff; stroke:#cdd6dd; stroke-width:1.5; }
      .label  { fill:#1f2933; font-size:15px; font-weight:700; }
      .sub    { fill:#6b7785; font-size:11.5px; font-family:'SFMono-Regular',Consolas,monospace; }
      .layer  { fill:#9aa5b1; font-size:10px; font-weight:700; letter-spacing:1.5px; }
      .flow   { stroke:#0f766e; stroke-width:2; fill:none; marker-end:url(#ah); }
      .band   { fill:#f0f4f3; stroke:#d6e0dd; stroke-width:1; }
      .bandtx { fill:#0f766e; font-size:12px; font-weight:700; letter-spacing:.5px; }
      .infra  { fill:#f6f7f8; stroke:#e1e5ea; stroke-width:1; }
      .infratx{ fill:#8a94a0; font-size:12px; font-weight:600; letter-spacing:.5px; }
      .title  { fill:#1f2933; font-size:18px; font-weight:800; }
    </style>
  </defs>

  <text x="40" y="44" class="title">NYC Taxi Supply&#8211;Demand &#183; Pipeline Architecture</text>

  <!-- Orchestration band -->
  <rect x="40" y="70" width="1040" height="34" rx="8" class="band"/>
  <text x="60" y="92" class="bandtx">ORCHESTRATION &#8212; Kestra (Docker Compose)</text>

  <!-- Stage layout: 6 stages -->
  <!-- x positions -->
  <!-- s1 40, s2 220, s3 400, s4 580, s5 760, s6 940 ; width 160, gap 20 -->
  <g>
    <text x="40"  y="150" class="layer">SOURCES</text>
    <rect x="40"  y="160" width="160" height="120" rx="10" class="stage"/>
    <text x="56"  y="190" class="label">Ingestion</text>
    <text x="56"  y="214" class="sub">TLC Parquet</text>
    <text x="56"  y="232" class="sub">(CloudFront)</text>
    <text x="56"  y="252" class="sub">OSM &#183; Geofabrik</text>
    <text x="56"  y="270" class="sub">Taxi Zones GeoJSON</text>
  </g>

  <g>
    <text x="220" y="150" class="layer">RAW LAKE</text>
    <rect x="220" y="160" width="160" height="120" rx="10" class="stage"/>
    <text x="236" y="190" class="label">GCS</text>
    <text x="236" y="214" class="sub">raw/ Parquet</text>
    <text x="236" y="232" class="sub">+ GeoJSON</text>
    <text x="236" y="252" class="sub">606 MB</text>
    <text x="236" y="270" class="sub">12 monthly files</text>
  </g>

  <g>
    <text x="400" y="150" class="layer">PROCESSING</text>
    <rect x="400" y="160" width="160" height="120" rx="10" class="stage"/>
    <text x="416" y="190" class="label">Dataproc</text>
    <text x="416" y="214" class="sub">PySpark (ephemeral)</text>
    <text x="416" y="232" class="sub">~35M rows</text>
    <text x="416" y="252" class="sub">H3 res-8 index</text>
    <text x="416" y="270" class="sub">schema-evo handling</text>
  </g>

  <g>
    <text x="580" y="150" class="layer">WAREHOUSE</text>
    <rect x="580" y="160" width="160" height="120" rx="10" class="stage"/>
    <text x="596" y="190" class="label">BigQuery</text>
    <text x="596" y="214" class="sub">dbt models</text>
    <text x="596" y="232" class="sub">staging &#8594;</text>
    <text x="596" y="250" class="sub">intermediate &#8594;</text>
    <text x="596" y="268" class="sub">marts + tests</text>
  </g>

  <g>
    <text x="760" y="150" class="layer">SPATIAL</text>
    <rect x="760" y="160" width="160" height="120" rx="10" class="stage"/>
    <text x="776" y="190" class="label">PostGIS</text>
    <text x="776" y="214" class="sub">Supabase 3.3</text>
    <text x="776" y="232" class="sub">ST_Within</text>
    <text x="776" y="250" class="sub">ST_Buffer</text>
    <text x="776" y="268" class="sub">185 zones + geom</text>
  </g>

  <g>
    <text x="940" y="150" class="layer">SERVING</text>
    <rect x="940" y="160" width="140" height="120" rx="10" class="stage"/>
    <text x="956" y="190" class="label">Streamlit</text>
    <text x="956" y="214" class="sub">pydeck</text>
    <text x="956" y="232" class="sub">2D / 3D H3</text>
    <text x="956" y="252" class="sub">KPIs +</text>
    <text x="956" y="270" class="sub">findings</text>
  </g>

  <!-- flow arrows -->
  <path class="flow" d="M200,220 L218,220"/>
  <path class="flow" d="M380,220 L398,220"/>
  <path class="flow" d="M560,220 L578,220"/>
  <path class="flow" d="M740,220 L758,220"/>
  <path class="flow" d="M920,220 L938,220"/>

  <!-- orchestration tethers (dotted down to each stage) -->
  <g stroke="#b8c6c2" stroke-width="1" stroke-dasharray="3,3">
    <line x1="120" y1="104" x2="120" y2="160"/>
    <line x1="300" y1="104" x2="300" y2="160"/>
    <line x1="480" y1="104" x2="480" y2="160"/>
    <line x1="660" y1="104" x2="660" y2="160"/>
    <line x1="840" y1="104" x2="840" y2="160"/>
    <line x1="1010" y1="104" x2="1010" y2="160"/>
  </g>

  <!-- Infra band -->
  <rect x="40" y="320" width="1040" height="34" rx="8" class="infra"/>
  <text x="60" y="342" class="infratx">INFRASTRUCTURE &#8212; Terraform + GCP &#183; region asia-southeast1</text>

  <!-- guardrail note -->
  <text x="40" y="396" class="sub" font-size="12.5">Metric guardrail (D-055): rate-of-totals, never average of ratios &#8212; enforced by dbt range &amp; accepted-value tests.</text>
</svg>
